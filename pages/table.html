<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title><Bootstrap review</title>

<link rel= "stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">


</head>
<body>

<div class="container">
<div class="row">

<!-- this is to make space-->	
<div class="col-md-6 col-md-offset-6"></div>
<!--- leave 6 cols to the left of the screen-->

<!-- The table class adds nice spacing and the other classes add additional style -->
    <table class="table table-bordered table-striped table-hover">
    <thead>
    <tr>
    <td colspan="4">Some Clubs and Student Organizations I am part of</td>
    </tr>
    </thead>
    <tbody>
    <tr>
 
    <!-- You can adjust the width of table columns as well -->
    <th class="col-md-2"></td>
 
    <!-- Use text alignment like text-center or text-right -->
    <th class="text-center">Name of Group</td>
    <!-- add this in for header-->
       
    <th class="text-center">Average</td>
    <th class="text-center">RBIs</td>
    <th class="text-center">Homeruns</td>
    </tr>
    <tr>
    <td><a href="#">Hank Aaron*</a></td>
    <td>.305</td>
    <td>2297</td>
    <td>755</td>
    </tr>
    <tr>
    <td><a href="#">Babe Ruth*</a></td>
    <td>.342</td>
    <td>2214</td>
    <td>714</td>
    </tr>
    <tr>
    <td><a href="#">Barry Bonds</a></td>
    <td>.298</td>
    <td>1996</td>
    <td>762</td>
    </tr>
    </tbody>
    </table>
  </div>
</div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
